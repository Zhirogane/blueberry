<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blueberry Sonolus Server</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #0b0f1b;
        }
        .container {
            background-color: #11182b;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #FFF;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        p {
            color: #DDD;
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        .buttons-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .button {
            display: block;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s, background-color 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .sonolus {
            background-color: #3251b8;
            color: #FFF;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
            .change {
            background: linear-gradient(180deg, #4f5d95, #555555, #e2943a, #db5079, #7c243d, #ffae42, #e30b5d, #ff0000);
            background-size: 100% 400%;
            animation: gradientMove 5s ease infinite;
            color: #FFF;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            }

    @keyframes gradientMove {
            0% { background-position: 0% 0%; }
            50% { background-position: 0% 100%; }
            100% { background-position: 0% 0%; }
            }
    </style>
</head>
<body>
<div class="container">
    <h1>Welcome to Blueberry Server</h1>
    <p>Is a server where you can find my stull like levels, skins and others.</p>
    <p>Is still in construction :)</p>
    <div class="buttons-wrapper">
        <a href="sonolus://shir0g4ne.github.io/Blueberry" class="button sonolus">Open in Sonolus</a>
        <a href="change.html" class="button change">Change Theme</a>
    </div>
</div>
</body>
</html>
