<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="icon.png">
    <title>Blueberry SS - Theme</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #0b0f1b;
        }
        .container {
            background-color: #11182b;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #FFF;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        p {
            color: #DDD;
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        .buttons-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .button {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 10px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            transition: transform 0.2s, background-color 0.3s;
        }
        .button:hover {
            transform: scale(1.05);
        }
        .back {
            background-color: #4f5d95;
            color: #FFF;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        .black {
            background-color: #411530;
            color: #FFF;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        .cloud {
            background-color: #e2943a;
            color: #FFF;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        .cran {
            background-color: #9e1b32;
            color: #FFF;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        .elder {
            background-color: #312139;
            color: #FFF;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        .golden {
            background-color: #f7a400;
            color: #FFF;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        .rasp {
            background-color: #e30b5d;
            color: #FFF;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        .straw {
            background-color: #ff0000;
            color: #FFF;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Change Theme</h1>
    <p>Select any Theme</p>
    <div class="buttons-wrapper">
        <a href="/berry/black.html" class="button black">Blackberry</a>
        <a href="/berry/cloud.html" class="button cloud">Cloudberry</a>
        <a href="/berry/cran.html" class="button cran">Cranberry</a>
        <a href="/berry/elder.html" class="button elder">Elderberry</a>
        <a href="/berry/golden.html" class="button golden">Goldenberry</a>
        <a href="/berry/rasp.html" class="button rasp">Raspberry</a>
        <a href="/berry/straw.html" class="button straw">Strawberry</a>
        <a href="index.html" class="button back">Back</a>
    </div>
</div>
</body>
</html>
